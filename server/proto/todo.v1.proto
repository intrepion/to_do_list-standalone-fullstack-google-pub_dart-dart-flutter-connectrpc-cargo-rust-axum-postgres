// To-Do List API v1
// Protocol Buffer definitions for ConnectRPC

syntax = "proto3";

package todo.v1;

option go_package = "./todo/v1";

// Common messages

message Empty {}

// Health check messages
message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

