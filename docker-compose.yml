version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: todo_postgres
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - todo_network

  # Rust server (development)
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_server
    environment:
      DATABASE_URL: postgres://todo_user:todo_password@postgres:5432/todo_db
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-me}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo_network

volumes:
  postgres_data:

networks:
  todo_network:
    driver: bridge