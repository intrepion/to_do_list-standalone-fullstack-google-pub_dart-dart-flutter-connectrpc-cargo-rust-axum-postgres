name: todo_client
description: To-Do List Flutter Client
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Google OAuth 2.0
  google_sign_in: ^6.1.5
  
  # ConnectRPC (placeholder - actual package may vary)
  # connectrpc_dart: ^0.4.0
  # flutter_connectrpc: ^0.4.0
  
  # HTTP client
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local storage for tokens
  shared_preferences: ^2.2.2
  
  # UI
  cupertino_icons: ^1.0.2
  
  # Optional: for better forms
  flutter_hooks: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  
  # Protobuf generation (if needed)
  # protoc_plugin: ^20.0.0

flutter:
  uses-material-design: true
