// Package v1 contains the Todo service definition.

syntax = "proto3";

package todo.v1;

option go_package = "./gen/todo/v1;go_package";

// Todo represents a single to-do item.
message Todo {
  string id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
  string created_at = 5;
  string updated_at = 6;
  string user_id = 7;
}

// CreateTodoRequest is the request for CreateTodo.
message CreateTodoRequest {
  string title = 1;
  string description = 2;
}

// CreateTodoResponse is the response for CreateTodo.
message CreateTodoResponse {
  Todo todo = 1;
}

// GetTodoRequest is the request for GetTodo.
message GetTodoRequest {
  string id = 1;
}

// GetTodoResponse is the response for GetTodo.
message GetTodoResponse {
  Todo todo = 1;
}

// ListTodosRequest is the request for ListTodos.
message ListTodosRequest {
  string user_id = 1;
}

// ListTodosResponse is the response for ListTodos.
message ListTodosResponse {
  repeated Todo todos = 1;
}

// UpdateTodoRequest is the request for UpdateTodo.
message UpdateTodoRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

// UpdateTodoResponse is the response for UpdateTodo.
message UpdateTodoResponse {
  Todo todo = 1;
}

// DeleteTodoRequest is the request for DeleteTodo.
message DeleteTodoRequest {
  string id = 1;
}

// DeleteTodoResponse is the response for DeleteTodo.
message DeleteTodoResponse {
  bool success = 1;
}

// TodoService handles todo operations.
service TodoService {
  rpc CreateTodo(CreateTodoRequest) returns (CreateTodoResponse);
  rpc GetTodo(GetTodoRequest) returns (GetTodoResponse);
  rpc ListTodos(ListTodosRequest) returns (ListTodosResponse);
  rpc UpdateTodo(UpdateTodoRequest) returns (UpdateTodoResponse);
  rpc DeleteTodo(DeleteTodoRequest) returns (DeleteTodoResponse);
}
